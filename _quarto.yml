project:
  type: website
  output-dir: docs

website:
  title: "Agawu Lab"
  description: "Measurement and Meaning in Gastrointestinal Chronic Complex Conditions (GI CCCs)"
  site-url: https://agawulab.com

  navbar:
    background: "#2d2e2f"
    foreground: "#FFFFFF"
    logo: images/logo.png
    left:
      - href: index.qmd
        text: Home
      - href: publications.qmd
        text: Publications
      - href: projects.qmd
        text: Projects
      - href: about.qmd
        text: About
      - href: cv.qmd
        text: CV
    right:
      - icon: envelope
        href: mailto:agawulab@chla.usc.edu
      - icon: github
        href: https://github.com/agawu-lab   # updated from /agawulab

  page-footer:
    left: |
      &copy; 2025 Agawu Lab | Children's Hospital Los Angeles
    center: |
      Visual identity: [ClearViz](https://github.com/cararthompson/clearviz) by [Cara Thompson](https://www.cararthompson.com/)
    right: |
      Built with [Quarto](https://quarto.org)

  search: true

format:
  html:
    theme:
      light: [cosmo, styles.scss]
    css: styles.css
    toc: true
    toc-depth: 3
    link-external-newwindow: true
    smooth-scroll: true
    # NEW — load the ClearViz font trio for every page
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Source+Sans+3:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

execute:
  freeze: auto
